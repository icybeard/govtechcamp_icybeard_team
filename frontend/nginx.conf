server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API — на сервис api из docker-compose (same-origin, CORS не нужен)
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Хэшированные бандлы vite — неизменяемые, кэшируем навсегда
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback. Без $uri/: у SPA нет каталожных индексов, а роут /data
    # совпадает по имени со статическим каталогом public/data — совпадение
    # с директорией давало 403 вместо страницы приложения.
    # no-cache: после редеплоя браузеры сразу берут свежий index.html
    # (и с ним новые хэши бандлов) — иначе висит устаревшая версия SPA
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
